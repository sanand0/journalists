<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <style>
    .font-headline { font-family: PoynterOSDisplay-Bold,'Poynter OS Display',Georgia,serif; font-size: 28px; fill: #231f20; }
    .font-deck     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size: 15px; fill: #231f20; }
    .font-agate    { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; }
    .font-bold-cond{ font-family: PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-weight: bold; }
    .font-note     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size: 10.5px; fill: #6b7280; }
    .font-source   { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size: 10px; fill: #9ca3af; }
  </style>

  <!-- White background -->
  <rect width="480" height="480" fill="#ffffff"/>

  <!-- Red masthead -->
  <rect fill="#ed1c24" width="480" height="29"/>

  <!-- Wordmark -->
  <text transform="translate(6 21) scale(1 1.11)" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:19px;font-weight:bold;fill:#ffffff">STA<tspan style="fill:#231f20">TOI</tspan>STICS</text>

  <!-- Tagline -->
  <text transform="translate(128 22) scale(1 1.11)" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:15px;fill:#ffffff">A slice of life in numbers</text>

  <!-- Border -->
  <rect fill="none" stroke="#231f20" stroke-width="0.8" x="0.4" y="0.4" width="479.2" height="479.2"/>

  <!-- Headline -->
  <text class="font-headline" text-anchor="middle" x="240" y="68">The same degree, very</text>
  <text class="font-headline" text-anchor="middle" x="240" y="100">different pay</text>

  <!-- Deck -->
  <text class="font-deck" text-anchor="middle" x="240" y="124">Urban graduate earnings in regular salaried work depend heavily</text>
  <text class="font-deck" text-anchor="middle" x="240" y="141">on employer size — a gap that rivals the education premium itself.</text>

  <!-- Separator after deck -->
  <line x1="30" y1="152" x2="450" y2="152" stroke="#231f20" stroke-width="0.6"/>

  <!-- Chart scope note -->
  <text text-anchor="middle" x="240" y="175" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:13px;font-weight:bold;fill:#231f20">Median monthly earnings in regular salaried work (urban)</text>

  <!-- ROW 1: Women graduates -->
  <!-- Row label -->
  <text text-anchor="end" x="230" y="240" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:13px;fill:#231f20">Women graduates</text>
  <!-- Dumbbell line -->
  <line x1="308" y1="235" x2="406" y2="235" stroke="#c1121f" stroke-width="2.5"/>
  <!-- Small firm dot (₹12k) -->
  <circle cx="308" cy="235" r="7" fill="#c1121f"/>
  <!-- Large firm dot (₹34k) -->
  <circle cx="406" cy="235" r="7" fill="#c1121f"/>
  <!-- Value labels -->
  <text text-anchor="middle" x="308" y="252" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:12px;fill:#c1121f">₹12k</text>
  <text text-anchor="middle" x="406" y="252" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:12px;fill:#c1121f">₹34k</text>

  <!-- ROW 2: Men graduates -->
  <!-- Row label -->
  <text text-anchor="end" x="230" y="310" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:13px;fill:#231f20">Men graduates</text>
  <!-- Dumbbell line -->
  <line x1="322" y1="305" x2="426" y2="305" stroke="#1d3461" stroke-width="2.5"/>
  <!-- Small firm dot (₹15k) -->
  <circle cx="322" cy="305" r="7" fill="#1d3461"/>
  <!-- Large firm dot (₹38.5k) -->
  <circle cx="426" cy="305" r="7" fill="#1d3461"/>
  <!-- Value labels -->
  <text text-anchor="middle" x="322" y="322" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:12px;fill:#1d3461">₹15k</text>
  <text text-anchor="middle" x="426" y="322" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:12px;fill:#1d3461">₹38.5k</text>

  <!-- Axis labels -->
  <text text-anchor="middle" x="315" y="345" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;fill:#6b7280">&lt; 6 workers</text>
  <text text-anchor="middle" x="416" y="345" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;fill:#6b7280">20+ workers</text>

  <!-- Job quality callout -->
  <text text-anchor="middle" x="240" y="375" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:12px;fill:#374151">No social security: 67% in tiny firms vs 10% in large firms</text>

  <!-- Bottom separator -->
  <line x1="30" y1="426" x2="450" y2="426" stroke="#231f20" stroke-width="0.6"/>

  <!-- Note -->
  <text class="font-note" text-anchor="middle" x="240" y="440">Urban graduate women and men in regular salaried work, by firm size | PLFS 2024</text>

  <!-- Source -->
  <text class="font-source" text-anchor="middle" x="240" y="456">Source: Periodic Labour Force Survey 2024, Ministry of Statistics &amp; Programme Implementation</text>
</svg>
