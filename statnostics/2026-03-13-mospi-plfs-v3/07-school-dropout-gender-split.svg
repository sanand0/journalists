<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <style>
    .font-headline { font-family: PoynterOSDisplay-Bold,'Poynter OS Display',Georgia,serif; font-size: 28px; fill: #231f20; }
    .font-deck     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size: 15px; fill: #231f20; }
    .font-note     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size: 10.5px; fill: #6b7280; }
    .font-source   { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size: 10px; fill: #9ca3af; }
    .font-stat     { font-family: GriffithGothic-Bold,'Griffith Gothic','Arial Narrow',Arial,sans-serif; font-weight: bold; }
    .font-agate    { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; }
  </style>

  <!-- White background -->
  <rect width="480" height="480" fill="#ffffff"/>

  <!-- Red masthead -->
  <rect fill="#ed1c24" width="480" height="29"/>

  <!-- Wordmark -->
  <text transform="translate(6 21) scale(1 1.11)" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:19px;font-weight:bold;fill:#ffffff">STA<tspan style="fill:#231f20">TOI</tspan>STICS</text>

  <!-- Tagline -->
  <text transform="translate(128 22) scale(1 1.11)" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:15px;fill:#ffffff">A slice of life in numbers</text>

  <!-- Border -->
  <rect fill="none" stroke="#231f20" stroke-width="0.8" x="0.4" y="0.4" width="479.2" height="479.2"/>

  <!-- Headline -->
  <text class="font-headline" text-anchor="middle" x="240" y="68">Why school stops:</text>
  <text class="font-headline" text-anchor="middle" x="240" y="100">the answer splits cleanly by gender</text>

  <!-- Deck -->
  <text class="font-deck" text-anchor="middle" x="240" y="124">Among married 18–24-year-olds who left school,</text>
  <text class="font-deck" text-anchor="middle" x="240" y="141">the stated reason reveals a near-total gender divide.</text>

  <!-- Separator after deck -->
  <line x1="30" y1="152" x2="450" y2="152" stroke="#231f20" stroke-width="0.6"/>

  <!-- LEFT BLOCK: Women -->
  <rect x="35" y="165" width="185" height="195" fill="#fff5f5" stroke="#c1121f" stroke-width="1" rx="4"/>
  <!-- Gender label -->
  <text text-anchor="middle" x="127" y="188" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:14px;font-weight:bold;fill:#c1121f">Women</text>
  <!-- Big stat -->
  <text class="font-stat" text-anchor="middle" x="127" y="255" style="font-size:70px;fill:#c1121f">73%</text>
  <!-- Reason labels -->
  <text class="font-agate" text-anchor="middle" x="127" y="278" style="font-size:14px;fill:#231f20">cite domestic</text>
  <text class="font-agate" text-anchor="middle" x="127" y="296" style="font-size:14px;fill:#231f20">duties at home</text>
  <!-- Sub label -->
  <text class="font-agate" text-anchor="middle" x="127" y="315" style="font-size:10px;fill:#9ca3af">(72.7% weighted)</text>
  <!-- Sample notes -->
  <text class="font-agate" text-anchor="middle" x="127" y="328" style="font-size:10px;fill:#9ca3af">currently married</text>
  <text class="font-agate" text-anchor="middle" x="127" y="341" style="font-size:10px;fill:#9ca3af">women 18–24</text>

  <!-- VS divider -->
  <text text-anchor="middle" x="240" y="265" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:18px;font-weight:bold;fill:#9ca3af">VS</text>

  <!-- RIGHT BLOCK: Men -->
  <rect x="260" y="165" width="185" height="195" fill="#f0f4ff" stroke="#1d3461" stroke-width="1" rx="4"/>
  <!-- Gender label -->
  <text text-anchor="middle" x="355" y="188" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:14px;font-weight:bold;fill:#1d3461">Men</text>
  <!-- Big stat -->
  <text class="font-stat" text-anchor="middle" x="355" y="255" style="font-size:70px;fill:#1d3461">89%</text>
  <!-- Reason labels -->
  <text class="font-agate" text-anchor="middle" x="355" y="278" style="font-size:14px;fill:#231f20">cite earning</text>
  <text class="font-agate" text-anchor="middle" x="355" y="296" style="font-size:14px;fill:#231f20">household income</text>
  <!-- Sub label -->
  <text class="font-agate" text-anchor="middle" x="355" y="315" style="font-size:10px;fill:#9ca3af">(88.6% weighted)</text>
  <!-- Sample notes -->
  <text class="font-agate" text-anchor="middle" x="355" y="328" style="font-size:10px;fill:#9ca3af">currently married</text>
  <text class="font-agate" text-anchor="middle" x="355" y="341" style="font-size:10px;fill:#9ca3af">men 18–24</text>

  <!-- Bottom context -->
  <text text-anchor="middle" x="240" y="385" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:12px;fill:#374151">These are people who attended school at some point but are not currently enrolled.</text>
  <text text-anchor="middle" x="240" y="401" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:12px;fill:#374151">Among never-married youth, the same split appears, though less extreme.</text>

  <!-- Bottom separator -->
  <line x1="30" y1="426" x2="450" y2="426" stroke="#231f20" stroke-width="0.6"/>

  <!-- Note -->
  <text class="font-note" text-anchor="middle" x="240" y="440">Married youth aged 18–24, not currently in school | PLFS 2024</text>

  <!-- Source -->
  <text class="font-source" text-anchor="middle" x="240" y="456">Source: Periodic Labour Force Survey 2024, Ministry of Statistics &amp; Programme Implementation</text>
</svg>
