<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480">
  <defs>
    <style>
      /* ── Masthead ── */
      .mast-bg  { fill: #ed1c24; }
      .wm-wh    { font-family: PoynterAgateOne-BoldCondensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 19px; font-weight: bold; fill: #ffffff; }
      .wm-dk    { font-family: PoynterAgateOne-BoldCondensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 19px; font-weight: bold; fill: #231f20; }
      .tagline  { font-family: PoynterAgateOne-Condensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 15px; fill: #ffffff; }
      /* ── Structure ── */
      .border   { fill: none; stroke: #231f20; stroke-width: 0.8; }
      .sep      { stroke: #231f20; stroke-width: 0.6; fill: none; }
      /* ── Content type ── */
      .hl       { font-family: PoynterOSDisplay-Bold, 'Poynter OS Display', Georgia, 'Times New Roman', serif;
                  font-size: 28px; font-weight: bold; fill: #231f20; }
      .deck     { font-family: PoynterAgateOne-Condensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 15px; fill: #231f20; }
      .col-hdr  { font-family: PoynterAgateOne-BoldCondensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 11px; font-weight: bold; fill: #6b7280; letter-spacing: 1px; }
      .arr-lbl  { font-family: PoynterAgateOne-Condensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 10px; fill: #9ca3af; }
      .val-big  { font-family: GriffithGothic-Bold, 'Griffith Gothic', 'Arial Narrow', Arial, sans-serif;
                  font-size: 26px; font-weight: bold; }
      .val-lbl  { font-family: PoynterAgateOne-Condensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 11px; }
      .cross-lbl{ font-family: PoynterAgateOne-Condensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 10px; font-style: italic; fill: #9ca3af; }
      .note     { font-family: PoynterAgateOne-Condensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 10.5px; fill: #6b7280; }
      .source   { font-family: PoynterAgateOne-Condensed, 'Poynter Agate One', 'Arial Narrow', Arial, sans-serif;
                  font-size: 10px; fill: #9ca3af; }
      /* ── Data colours ── */
      .domestic { fill: #c1121f; }
      .salaried { fill: #1d3461; }
    </style>
  </defs>

  <!-- ─── Background ─── -->
  <rect width="480" height="480" fill="#ffffff"/>

  <!-- ─── Masthead ─── -->
  <rect class="mast-bg" width="480" height="29"/>
  <!-- STATOISTICS: STA=white, TOI=dark #231f20, STICS=white — all PoynterAgateOne-BoldCondensed 19px -->
  <text transform="translate(6 21) scale(1 1.11)" class="wm-wh">STA<tspan class="wm-dk">TOI</tspan>STICS</text>
  <!-- Tagline: PoynterAgateOne-Condensed 15px white -->
  <text transform="translate(128 22) scale(1 1.11)" class="tagline">A slice of life in numbers</text>

  <!-- ─── Card border ─── -->
  <rect class="border" x="0.4" y="0.4" width="479.2" height="479.2"/>

  <!-- ─── Headline: PoynterOSDisplay-Bold 28px ─── -->
  <text x="240" y="67" text-anchor="middle" class="hl">For India's women graduates,</text>
  <text x="240" y="100" text-anchor="middle" class="hl">marriage ends the career</text>

  <!-- ─── Deck: PoynterAgateOne-Condensed 15px ─── -->
  <text x="240" y="122" text-anchor="middle" class="deck">Among women aged 25–34 with a college degree,</text>
  <text x="240" y="140" text-anchor="middle" class="deck">marriage is linked to leaving paid work for domestic duties.</text>

  <!-- ─── Section separator ─── -->
  <line class="sep" x1="30" y1="153" x2="450" y2="153"/>

  <!-- ─── Chart ─── -->
  <g id="chart">

    <!-- Column headers + direction arrow -->
    <text x="155" y="168" text-anchor="middle" class="col-hdr">NEVER-MARRIED</text>
    <text x="325" y="168" text-anchor="middle" class="col-hdr">MARRIED</text>
    <line x1="193" y1="175" x2="287" y2="175" stroke="#9ca3af" stroke-width="0.8"/>
    <polygon points="287,172 295,175 287,178" fill="#9ca3af"/>
    <text x="240" y="173" text-anchor="middle" class="arr-lbl">after marriage</text>

    <!--
      Scale: y=187 (top, ~65%) → y=415 (bottom, 0%)
      Range = 228 px   →  3.508 px per %

      Never-married salaried  57.3%  →  415 − 57.3×3.508 = 213.9  ≈ 214
      Married       salaried  25.1%  →  415 − 25.1×3.508 = 326.9  ≈ 327
      Never-married domestic   7.1%  →  415 −  7.1×3.508 = 390.1  ≈ 390
      Married       domestic  55.8%  →  415 − 55.8×3.508 = 219.4  ≈ 219

      Crossing ≈ x=261, y=276
    -->

    <!-- Faint column guide lines -->
    <line x1="155" y1="184" x2="155" y2="415" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,6"/>
    <line x1="325" y1="184" x2="325" y2="415" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,6"/>

    <!-- Navy slope: salaried work drops 57% → 25% -->
    <line x1="155" y1="214" x2="325" y2="327"
          stroke="#1d3461" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Crimson slope: domestic duties rises 7% → 56% -->
    <line x1="155" y1="390" x2="325" y2="219"
          stroke="#c1121f" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Endpoint circles -->
    <circle cx="155" cy="214" r="6.5" fill="#1d3461"/>
    <circle cx="325" cy="327" r="6.5" fill="#1d3461"/>
    <circle cx="155" cy="390" r="6.5" fill="#c1121f"/>
    <circle cx="325" cy="219" r="6.5" fill="#c1121f"/>

    <!-- Left labels (never-married): right-aligned at x=138 -->
    <text x="138" y="209" text-anchor="end" class="val-big salaried">57%</text>
    <text x="138" y="223" text-anchor="end" class="val-lbl salaried">in salaried work</text>

    <text x="138" y="385" text-anchor="end" class="val-big domestic">7%</text>
    <text x="138" y="399" text-anchor="end" class="val-lbl domestic">in domestic duties</text>

    <!-- Right labels (married): left-aligned at x=342 -->
    <text x="342" y="214" text-anchor="start" class="val-big domestic">56%</text>
    <text x="342" y="228" text-anchor="start" class="val-lbl domestic">in domestic duties</text>

    <text x="342" y="322" text-anchor="start" class="val-big salaried">25%</text>
    <text x="342" y="336" text-anchor="start" class="val-lbl salaried">in salaried work</text>

    <!-- Crossing annotation at (261, 276) -->
    <circle cx="261" cy="276" r="5" fill="#ffffff" stroke="#d1d5db" stroke-width="1.2"/>
    <text x="269" y="272" class="cross-lbl">careers flip</text>

  </g>

  <!-- ─── Bottom separator ─── -->
  <line class="sep" x1="30" y1="426" x2="450" y2="426"/>

  <!-- ─── Note: 10.5 px ─── -->
  <text x="240" y="440" text-anchor="middle" class="note">Urban women, college degree+, in salaried households · Descriptive, not causal</text>

  <!-- ─── Source: 10 px ─── -->
  <text x="240" y="456" text-anchor="middle" class="source">Source: Periodic Labour Force Survey 2024, Ministry of Statistics &amp; Programme Implementation</text>

</svg>
