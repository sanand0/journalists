<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
<defs>
<style>
.mast-bg  { fill: #ed1c24; }
.wm-wh    { font-family: PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:19px; font-weight:bold; fill:#ffffff; }
.wm-dk    { font-family: PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:19px; font-weight:bold; fill:#231f20; }
.tagline  { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:15px; fill:#ffffff; }
.border   { fill:none; stroke:#231f20; stroke-width:0.8; }
.sep      { stroke:#231f20; stroke-width:0.6; fill:none; }
.hl       { font-family: PoynterOSDisplay-Bold,'Poynter OS Display',Georgia,'Times New Roman',serif; font-size:24px; font-weight:bold; fill:#231f20; }
.deck     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:13px; fill:#231f20; }
.note     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:10.5px; fill:#6b7280; }
.source   { font-family: PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif; font-size:10px; fill:#9ca3af; }
</style>
</defs>

<!-- Background -->
<rect width="480" height="480" fill="#ffffff"/>

<!-- Masthead -->
<rect class="mast-bg" width="480" height="29"/>
<text transform="translate(6 21) scale(1 1.11)" class="wm-wh">STA<tspan class="wm-dk">TOI</tspan>STICS</text>
<text transform="translate(128 22) scale(1 1.11)" class="tagline">A slice of life in numbers</text>

<!-- Border -->
<rect class="border" x="0.4" y="0.4" width="479.2" height="479.2" fill="none" stroke="#231f20" stroke-width="0.8"/>

<!-- Headline -->
<text x="240" y="67" text-anchor="middle" class="hl">In a joint family, being &#x2018;the wife&#x2019;</text>
<text x="240" y="100" text-anchor="middle" class="hl">costs more than the marriage itself</text>

<!-- Deck -->
<text x="240" y="122" text-anchor="middle" class="deck">Married graduate women listed as &#x2018;spouse of head&#x2019; are far less likely</text>
<text x="240" y="140" text-anchor="middle" class="deck">to hold a regular job than those listed as &#x2018;self&#x2019; or &#x2018;daughter&#x2019;.</text>

<!-- Separator after deck -->
<line class="sep" x1="30" y1="153" x2="450" y2="153"/>

<!-- Content area: Column backgrounds -->
<rect x="32" y="162" width="204" height="173" fill="#fafafa" rx="2"/>
<rect x="244" y="162" width="204" height="173" fill="#fafafa" rx="2"/>

<!-- Vertical divider -->
<line x1="240" y1="162" x2="240" y2="335" stroke="#e5e7eb" stroke-width="0.8" fill="none"/>

<!-- LEFT column -->
<text x="134" y="178" text-anchor="middle" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#231f20;">WIFE / SPOUSE OF HEAD</text>
<text x="134" y="191" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:10px;fill:#9ca3af;">n = 4,947</text>
<text x="134" y="211" text-anchor="middle" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#c1121f;">DOMESTIC ONLY</text>
<text x="134" y="248" text-anchor="middle" style="font-family:GriffithGothic-Bold,'Griffith Gothic','Arial Narrow',Arial,sans-serif;font-size:36px;font-weight:bold;fill:#c1121f;">57.2%</text>
<line x1="50" y1="260" x2="218" y2="260" stroke="#e5e7eb" stroke-width="0.8" fill="none"/>
<text x="134" y="278" text-anchor="middle" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#1d3461;">REGULAR SALARIED</text>
<text x="134" y="318" text-anchor="middle" style="font-family:GriffithGothic-Bold,'Griffith Gothic','Arial Narrow',Arial,sans-serif;font-size:36px;font-weight:bold;fill:#1d3461;">13.8%</text>

<!-- RIGHT column -->
<text x="346" y="178" text-anchor="middle" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#231f20;">SELF OR DAUGHTER</text>
<text x="346" y="191" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:10px;fill:#9ca3af;">n = 451</text>
<text x="346" y="211" text-anchor="middle" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#c1121f;">DOMESTIC ONLY</text>
<text x="346" y="248" text-anchor="middle" style="font-family:GriffithGothic-Bold,'Griffith Gothic','Arial Narrow',Arial,sans-serif;font-size:36px;font-weight:bold;fill:#c1121f;">43.1%</text>
<line x1="262" y1="260" x2="430" y2="260" stroke="#e5e7eb" stroke-width="0.8" fill="none"/>
<text x="346" y="278" text-anchor="middle" style="font-family:PoynterAgateOne-BoldCondensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#1d3461;">REGULAR SALARIED</text>
<text x="346" y="318" text-anchor="middle" style="font-family:GriffithGothic-Bold,'Griffith Gothic','Arial Narrow',Arial,sans-serif;font-size:36px;font-weight:bold;fill:#1d3461;">30.7%</text>

<!-- Annotation separator -->
<line class="sep" x1="30" y1="337" x2="450" y2="337"/>

<!-- Annotation -->
<text x="240" y="360" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-style:italic;fill:#374151;">Controlling for children, state &amp; social group: wife role &#x2192;</text>
<text x="240" y="378" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Poynter Agate One','Arial Narrow',Arial,sans-serif;font-size:11px;font-style:italic;fill:#374151;">+19 pts more domestic-only &#x00B7; &#x2212;18 pts less regular salaried</text>

<!-- Footer -->
<line class="sep" x1="30" y1="408" x2="450" y2="408"/>

<!-- Note and Source -->
<text x="240" y="425" text-anchor="middle" class="note">Currently married graduate women aged 25&#x2013;34 | PLFS 2024</text>
<text x="240" y="440" text-anchor="middle" class="source">Source: Periodic Labour Force Survey 2024, Ministry of Statistics &amp; Programme Implementation</text>
</svg>
