<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
<defs><style>
.mast-bg  { fill: #ed1c24; }
.wm-wh    { font-family: PoynterAgateOne-BoldCondensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:19px; font-weight:bold; fill:#ffffff; }
.wm-dk    { font-family: PoynterAgateOne-BoldCondensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:19px; font-weight:bold; fill:#231f20; }
.tagline  { font-family: PoynterAgateOne-Condensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:15px; fill:#ffffff; }
.border   { fill:none; stroke:#231f20; stroke-width:0.8; }
.sep      { stroke:#231f20; stroke-width:0.6; fill:none; }
.hl       { font-family: PoynterOSDisplay-Bold,'Poynter OS Display',Georgia,'Times New Roman',serif; font-size:26px; font-weight:bold; fill:#231f20; }
.deck     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:13px; fill:#231f20; }
.note     { font-family: PoynterAgateOne-Condensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:10.5px; fill:#6b7280; }
.source   { font-family: PoynterAgateOne-Condensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:10px; fill:#9ca3af; }
.tier-lbl { font-family: PoynterAgateOne-Condensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:10px; font-weight:bold; }
.axis-lbl { font-family: PoynterAgateOne-Condensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:9px; fill:#9ca3af; }
.sub-lbl  { font-family: PoynterAgateOne-Condensed,'Poynter Agate One Con','Arial Narrow',Arial,sans-serif; font-size:10px; fill:#6b7280; }
</style></defs>

<!-- Background -->
<rect width="480" height="480" fill="#ffffff"/>

<!-- Masthead -->
<rect class="mast-bg" width="480" height="29"/>
<text transform="translate(6 21) scale(1 1.11)" class="wm-wh">STA<tspan class="wm-dk">TOI</tspan>STICS</text>
<text transform="translate(128 22) scale(1 1.11)" class="tagline">A slice of life in numbers</text>

<!-- Border -->
<rect class="border" x="0.4" y="0.4" width="479.2" height="479.2"/>

<!-- Headline -->
<text x="240" y="67" text-anchor="middle" class="hl">Only 39% of governments have</text>
<text x="240" y="96" text-anchor="middle" class="hl" textLength="440" lengthAdjust="spacingAndGlyphs">a youth-jobs plan that&#x2019;s actually running</text>

<!-- Deck -->
<text x="240" y="116" text-anchor="middle" class="deck" textLength="440" lengthAdjust="spacingAndGlyphs">185 reporting areas. 67 more have a written plan sitting idle &#x2014;</text>
<text x="240" y="132" text-anchor="middle" class="deck">developed but not yet operational. India is one of them.</text>

<!-- Sep after deck -->
<line class="sep" x1="30" y1="146" x2="450" y2="146"/>

<!-- Tier labels above bar (y=160–205) -->
<!-- Tier 1: No plan (6 areas, center x=37, w=14) — annotate at x=70 -->
<text x="75" y="196" text-anchor="middle" class="tier-lbl" style="fill:#9ca3af;">No plan</text>
<text x="75" y="207" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:12px;font-weight:bold;fill:#9ca3af;">6</text>
<line x1="44" y1="210" x2="70" y2="207" stroke="#d1d5db" stroke-width="0.8"/>

<!-- Tier 2: Under dev. (40 areas, center x=89, w=91) -->
<text x="89" y="175" text-anchor="middle" class="tier-lbl" style="fill:#92400e;">Under</text>
<text x="89" y="186" text-anchor="middle" class="tier-lbl" style="fill:#92400e;">develop.</text>
<text x="89" y="200" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:14px;font-weight:bold;fill:#92400e;">40</text>

<!-- Tier 3: Plan only (67 areas, center x=211, w=152) -->
<text x="211" y="170" text-anchor="middle" class="tier-lbl" style="fill:#c35012;">Plan exists,</text>
<text x="211" y="182" text-anchor="middle" class="tier-lbl" style="fill:#c35012;">not running</text>
<text x="211" y="196" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:14px;font-weight:bold;fill:#c35012;">67</text>

<!-- Tier 4: Operational (72 areas, center x=368, w=163) -->
<text x="368" y="175" text-anchor="middle" class="tier-lbl" style="fill:#1a5e6e;">Operational</text>
<text x="368" y="190" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:16px;font-weight:bold;fill:#1a5e6e;">72</text>

<!-- Stacked bar: x=30, y=210, height=50, total width=420 -->
<!-- Tier widths: No strategy=14, Under dev=91, Plan only=152, Operational=163 -->
<rect x="30"  y="210" width="14"  height="50" fill="#f3f4f6"/>
<rect x="44"  y="210" width="91"  height="50" fill="#fde68a"/>
<rect x="135" y="210" width="152" height="50" fill="#f97316"/>
<rect x="287" y="210" width="163" height="50" fill="#1a5e6e"/>

<!-- White dividers between segments -->
<line x1="44"  y1="210" x2="44"  y2="260" stroke="#ffffff" stroke-width="1.5"/>
<line x1="135" y1="210" x2="135" y2="260" stroke="#ffffff" stroke-width="1.5"/>
<line x1="287" y1="210" x2="287" y2="260" stroke="#ffffff" stroke-width="1.5"/>

<!-- India arrow at x=211 (center of tier 3), pointing up to bar -->
<polygon points="211,264 204,274 218,274" fill="#c1121f"/>
<text x="211" y="290" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#c1121f;">India: plan exists, not running</text>

<!-- Separator at y=302 -->
<line class="sep" x1="30" y1="302" x2="450" y2="302"/>

<!-- Peer comparison table header -->
<text x="50"  y="316" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:10px;font-weight:bold;fill:#6b7280;">Country</text>
<text x="205" y="316" text-anchor="middle" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:10px;font-weight:bold;fill:#6b7280;">Score</text>
<text x="290" y="316" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:10px;font-weight:bold;fill:#6b7280;">Status</text>
<line x1="30" y1="320" x2="450" y2="320" stroke="#e5e7eb" stroke-width="0.6"/>

<!-- Row 1: China (score 3) — Operational -->
<text x="50" y="334" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#231f20;">China</text>
<!-- 3 filled teal dots -->
<circle cx="196" cy="330" r="4" fill="#1a5e6e"/>
<circle cx="208" cy="330" r="4" fill="#1a5e6e"/>
<circle cx="220" cy="330" r="4" fill="#1a5e6e"/>
<text x="290" y="334" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#1a5e6e;">Operational</text>

<!-- Row 2: India (score 2) — Plan only -->
<text x="50" y="350" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#1d3461;">India</text>
<!-- 2 filled orange + 1 open -->
<circle cx="196" cy="346" r="4" fill="#f97316"/>
<circle cx="208" cy="346" r="4" fill="#f97316"/>
<circle cx="220" cy="346" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
<text x="290" y="350" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;font-weight:bold;fill:#c1121f;">Plan only</text>

<!-- Row 3: Indonesia (score 2) — Plan only -->
<text x="50" y="366" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#231f20;">Indonesia</text>
<circle cx="196" cy="362" r="4" fill="#f97316"/>
<circle cx="208" cy="362" r="4" fill="#f97316"/>
<circle cx="220" cy="362" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
<text x="290" y="366" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#c35012;">Plan only</text>

<!-- Row 4: Pakistan (score 2) — Plan only -->
<text x="50" y="382" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#231f20;">Pakistan</text>
<circle cx="196" cy="378" r="4" fill="#f97316"/>
<circle cx="208" cy="378" r="4" fill="#f97316"/>
<circle cx="220" cy="378" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
<text x="290" y="382" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#c35012;">Plan only</text>

<!-- Row 5: Bangladesh (score 1) — Under development -->
<text x="50" y="398" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#231f20;">Bangladesh</text>
<circle cx="196" cy="394" r="4" fill="#fde68a" stroke="#d97706" stroke-width="0.5"/>
<circle cx="208" cy="394" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
<circle cx="220" cy="394" r="4" fill="none" stroke="#9ca3af" stroke-width="1.5"/>
<text x="290" y="398" style="font-family:PoynterAgateOne-Condensed,'Arial Narrow',Arial,sans-serif;font-size:11px;fill:#92400e;">Under development</text>

<!-- Footer sep -->
<line class="sep" x1="30" y1="412" x2="450" y2="412"/>

<!-- Note -->
<text x="240" y="424" text-anchor="middle" class="note">Score 3=operationalized, 2=developed not operational, 1=under development, 0=no strategy.</text>

<!-- Source -->
<text x="240" y="437" text-anchor="middle" class="source">UN SDG Indicator SL_CPA_YEMP, 2025 &#xB7; data.un.org</text>
</svg>
