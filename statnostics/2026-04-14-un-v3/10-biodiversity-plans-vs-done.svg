<!-- Masthead -->
<rect class="mast-bg" width="480" height="29"/>
<text transform="translate(6 21) scale(1 1.11)" class="wm-wh">STA<tspan class="wm-dk">TOI</tspan>STICS</text>
<text transform="translate(128 22) scale(1 1.11)" class="tagline">A slice of life in numbers</text>

<!-- Border -->
<rect class="border" x="0.4" y="0.4" width="479.2" height="479.2"/>

<!-- Headline -->
<text x="240" y="67" text-anchor="middle" class="hl">Nature is in the plan. But only</text>
<text x="240" y="96" text-anchor="middle" class="hl">1 in 4 countries says it&#x2019;s achieved.</text>

<!-- Deck -->
<text x="240" y="116" text-anchor="middle" class="deck" textLength="440" lengthAdjust="spacingAndGlyphs">158 of 195 reporting areas say biodiversity is in their national framework.</text>
<text x="240" y="132" text-anchor="middle" class="deck">Only 50 (25.6%) say the target is actually achieved.</text>

