<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="svg-card" class="card"
     width="800" height="1800" viewBox="0 0 800 1800"
     style="display:block;overflow:visible">
<style type="text/css"><![CDATA[
  @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600;8..60,700&display=swap");
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --title-font: 'Playfair Display', serif; --body-font: 'Source Serif 4', serif; }
  .card-header { padding: 18px 28px 14px; text-align: center; border-bottom: 3px double #2a1f0e; }
  .badge {
    font-family: var(--title-font); font-size: 10px; font-weight: 700;
    letter-spacing: 4.5px; text-transform: uppercase; color: #8b0000;
    display: block; margin-bottom: 10px;
  }
  .badge::before, .badge::after { content: '\2014'; margin: 0 10px; opacity: 0.6; }
  .card-title { font-family: var(--title-font); font-size: 30px; font-weight: 900; color: #1a1208; line-height: 1.15; text-transform: uppercase; letter-spacing: 0.3px; }
  .card-body { padding: 16px 28px 0; font-family: var(--body-font); }
  .section { font-size: 18px; color: #1a1208; line-height: 1.55; margin-bottom: 10px; }
  .section-label { font-family: var(--title-font); font-style: italic; font-weight: 700; color: #8b0000; }
  .steps-heading { font-family: var(--title-font); font-size: 13px; font-style: italic; font-weight: 700; color: #8b0000; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .steps-label { font-family: var(--title-font); font-size: 12px; font-style: italic; color: #8b0000; letter-spacing: 1.5px; text-transform: uppercase; margin: 6px 0 6px; }
  .steps { counter-reset: step-counter; padding-bottom: 16px; }
  .step { counter-increment: step-counter; display: flex; align-items: flex-start; padding: 11px 0; border-top: 1px solid #c8b99a; gap: 16px; }
  .step:first-child { border-top: 1px solid #c8b99a; }
  .step::before { content: counter(step-counter); font-family: var(--title-font); font-size: 38px; font-weight: 700; font-style: italic; color: #c0aa82; line-height: 1; min-width: 38px; text-align: center; flex-shrink: 0; margin-top: 1px; }
  .step-content { font-size: 18px; color: #1a1208; line-height: 1.52; flex: 1; }
  .step-content strong { font-weight: 700; }
  .card-note { padding: 10px 28px 12px; font-size: 16px; color: #1a1208; border-top: 1px solid #c8b99a; line-height: 1.5; font-family: var(--body-font); }
  .note-label { font-family: var(--title-font); font-style: italic; font-weight: 700; color: #8b0000; }
  .note-text { font-weight: 600; }
  .card-footer { display: flex; align-items: center; padding: 12px 28px 16px; gap: 16px; border-top: 3px double #2a1f0e; }
  .disclaimer { flex: 1; font-size: 13px; color: #4a3f2a; line-height: 1.55; font-style: italic; font-family: var(--body-font); }
  .tip-line { display: block; margin-top: 3px; font-style: normal; }
  .tip-name { font-weight: 700; }
  .qr-block { flex-shrink: 0; text-align: center; }
  .qr-label { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #4a3f2a; margin-bottom: 4px; line-height: 1.4; font-family: var(--body-font); }
  #qr-code canvas, #qr-code img { display: block; }
]]></style>
<rect id="card-bg" x="0" y="0" width="800" height="1800" fill="#f5f0e6"/>

  <foreignObject id="fo-header" x="0" y="0" width="800" height="320" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-header">
      <span class="badge">Hack of the Day</span>
      <h1 class="card-title">{{title}}</h1>
    </div>
  </foreignObject>

  <foreignObject id="fo-body" x="0" y="320" width="800" height="1100" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-body">
      <p class="section"><strong class="section-label">What it solves:</strong> {{what_it_solves}}</p>
      {{#what_to_do}}
      <p class="section"><strong class="section-label">What to do:</strong> {{what_to_do}}</p>
      <p class="steps-label">Steps:</p>
      {{/what_to_do}}
      {{^what_to_do}}
      <p class="steps-heading">What to do — Quick Steps:</p>
      {{/what_to_do}}
      <div class="steps">
        {{#steps}}
        <div class="step">
          <div class="step-content">{{#bold_title}}<strong>{{bold_title}}</strong> {{/bold_title}}{{{text}}}</div>
        </div>
        {{/steps}}
      </div>
    </div>
  </foreignObject>

  {{#note}}
  <foreignObject id="fo-note" x="0" y="1420" width="800" height="200" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-note">
      <span class="note-label">{{note_label}}:</span>
      <strong class="note-text"> {{note}}</strong>
    </div>
  </foreignObject>
  {{/note}}

  <foreignObject id="fo-footer" x="0" y="1620" width="800" height="155" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-footer">
      <div class="disclaimer">
        <em>Hacks are based on verified public sources. Readers are advised to follow official websites &amp; updated rules</em>
        <span class="tip-line">Tip from <strong class="tip-name">{{tip_name}}</strong>{{tip_domain}}</span>
      </div>
      <div class="qr-block">
        <div class="qr-label">Scan for<br/>more hacks</div>
        <div id="qr-code" data-url="{{qr_url}}"></div>
      </div>
    </div>
  </foreignObject>
<script type="text/javascript" href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" xlink:href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  "use strict";
  function layout() {
    var svg = document.getElementById("svg-card");
    var bg  = document.getElementById("card-bg");
    if (!svg || !bg) return;
    var fos = Array.from(svg.querySelectorAll("foreignObject[id^=\"fo-\"]"));
    var y = 0;
    fos.forEach(function (fo) {
      fo.setAttribute("y", y);
      fo.setAttribute("height", "9999");
      var div = fo.firstElementChild;
      var h = div ? Math.ceil(div.getBoundingClientRect().height) : 0;
      fo.setAttribute("height", Math.max(h, 1));
      y += h;
    });
    bg.setAttribute("height", y);
    svg.setAttribute("height", y);
    svg.setAttribute("viewBox", "0 0 800 " + y);
  }
  function initQR() {
    var qrEl = document.getElementById("qr-code");
    if (!qrEl || typeof QRCode === "undefined") return;
    var url = qrEl.getAttribute("data-url") || "https://timesinternet.com";
    new QRCode(qrEl, { text: url, width: 80, height: 80, correctLevel: QRCode.CorrectLevel.M });
  }
  if (document.fonts) { document.fonts.ready.then(layout); }
  window.addEventListener("load", function () { initQR(); setTimeout(layout, 150); });
})();
]]></script>
</svg>
