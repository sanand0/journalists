<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="svg-card" class="card"
     width="800" height="1800" viewBox="0 0 800 1800"
     style="display:block;overflow:visible">
<style type="text/css"><![CDATA[
  @import url("https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;0,9..144,700;1,9..144,400&family=Outfit:wght@400;500;600;700;800&display=swap");
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --title-font: 'Fraunces', serif; --body-font: 'Outfit', sans-serif; --navy: #1c2b3a; --teal: #2ec4b6; --teal-bg: rgba(46,196,182,0.09); --bg: #fafaf8; --dark: #1a1a1a; --mid: #4a5568; --border: #e4ddd4; }
  .card-masthead { background: var(--navy); padding: 13px 32px; }
  .masthead-content { display: flex; align-items: center; }
  .masthead-brand { font-family: var(--body-font); font-size: 10px; font-weight: 600; letter-spacing: 3.5px; text-transform: uppercase; color: rgba(255,255,255,0.48); white-space: nowrap; }
  .masthead-rule { flex: 1; height: 1px; background: rgba(255,255,255,0.1); margin: 0 18px; }
  .masthead-tag { font-family: var(--body-font); font-size: 10px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--teal); white-space: nowrap; }
  .card-title-section { padding: 24px 32px 20px; border-bottom: 1px solid var(--border); background: var(--bg); }
  .card-title { font-family: var(--title-font); font-size: 34px; font-weight: 700; color: var(--navy); line-height: 1.15; letter-spacing: -0.3px; }
  .title-underline { width: 44px; height: 4px; background: var(--teal); margin-top: 14px; border-radius: 2px; }
  .card-body { padding: 20px 32px 0; font-family: var(--body-font); background: var(--bg); }
  .solve-callout { background: var(--teal-bg); border-left: 3px solid var(--teal); padding: 11px 16px 13px; margin-bottom: 18px; border-radius: 0 6px 6px 0; }
  .solve-callout-label { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--teal); margin-bottom: 5px; }
  .solve-text { font-size: 17px; color: var(--dark); line-height: 1.55; }
  .wtd-block { margin-bottom: 14px; }
  .wtd-label { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--mid); margin-bottom: 5px; }
  .wtd-text { font-size: 17px; color: var(--dark); line-height: 1.55; }
  .steps-intro { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--mid); margin-bottom: 18px; font-family: var(--body-font); }
  .steps { counter-reset: step-counter; padding-bottom: 8px; }
  .step { counter-increment: step-counter; display: flex; align-items: flex-start; gap: 16px; position: relative; padding-bottom: 20px; }
  .step:last-child { padding-bottom: 16px; }
  .step::before { content: counter(step-counter); width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--teal); background: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: var(--teal); flex-shrink: 0; position: relative; z-index: 1; margin-top: 2px; }
  .step:not(:last-child)::after { content: ''; position: absolute; left: 14px; top: 34px; bottom: -2px; width: 2px; background: var(--border); }
  .step-content { font-size: 18px; color: var(--dark); line-height: 1.5; flex: 1; padding-top: 4px; font-family: var(--body-font); }
  .step-content strong { font-weight: 700; }
  .card-note { padding: 10px 32px 13px; font-size: 16px; color: var(--dark); line-height: 1.5; background: var(--teal-bg); border-top: 1px solid var(--border); font-family: var(--body-font); }
  .note-label { font-weight: 700; color: var(--teal); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  .note-text { font-weight: 600; }
  .card-footer { display: flex; align-items: center; padding: 12px 32px 16px; gap: 16px; border-top: 1px solid var(--border); background: var(--bg); }
  .disclaimer { flex: 1; font-size: 13px; color: var(--mid); line-height: 1.55; font-style: italic; font-family: var(--body-font); }
  .tip-line { display: block; margin-top: 3px; font-style: normal; }
  .tip-name { font-weight: 700; color: var(--navy); }
  .qr-block { flex-shrink: 0; text-align: center; }
  .qr-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--mid); margin-bottom: 4px; line-height: 1.4; font-family: var(--body-font); }
  #qr-code canvas, #qr-code img { display: block; }
]]></style>
<rect id="card-bg" x="0" y="0" width="800" height="1800" fill="#fafaf8"/>

  <!-- MASTHEAD + TITLE combined in fo-header -->
  <foreignObject id="fo-header" x="0" y="0" width="800" height="320" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <div class="card-masthead">
        <div class="masthead-content">
          <span class="masthead-brand">◆ Hack of the Day</span>
          <span class="masthead-rule"></span>
          <span class="masthead-tag">Daily Briefing</span>
        </div>
      </div>
      <div class="card-title-section">
        <h1 class="card-title">{{title}}</h1>
        <div class="title-underline"></div>
      </div>
    </div>
  </foreignObject>

  <!-- BODY -->
  <foreignObject id="fo-body" x="0" y="320" width="800" height="1100" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-body">
      <div class="solve-callout">
        <div class="solve-callout-label">◆ The Problem</div>
        <div class="solve-text">{{what_it_solves}}</div>
      </div>
      {{#what_to_do}}
      <div class="wtd-block">
        <div class="wtd-label">What to do</div>
        <div class="wtd-text">{{what_to_do}}</div>
      </div>
      <p class="steps-intro">Steps</p>
      {{/what_to_do}}
      {{^what_to_do}}
      <p class="steps-intro">Quick Steps</p>
      {{/what_to_do}}
      <div class="steps">
        {{#steps}}
        <div class="step">
          <div class="step-content">{{#bold_title}}<strong>{{bold_title}}</strong> {{/bold_title}}{{{text}}}</div>
        </div>
        {{/steps}}
      </div>
    </div>
  </foreignObject>

  {{#note}}
  <foreignObject id="fo-note" x="0" y="1420" width="800" height="200" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-note">
      <span class="note-label">{{note_label}}:</span>
      <strong class="note-text"> {{note}}</strong>
    </div>
  </foreignObject>
  {{/note}}

  <foreignObject id="fo-footer" x="0" y="1620" width="800" height="155" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-footer">
      <div class="disclaimer">
        <em>Hacks are based on verified public sources. Readers are advised to follow official websites &amp; updated rules</em>
        <span class="tip-line">Tip from <strong class="tip-name">{{tip_name}}</strong>{{tip_domain}}</span>
      </div>
      <div class="qr-block">
        <div class="qr-label">Scan for<br/>more hacks</div>
        <div id="qr-code" data-url="{{qr_url}}"></div>
      </div>
    </div>
  </foreignObject>
<script type="text/javascript" href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" xlink:href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  "use strict";
  function layout() {
    var svg = document.getElementById("svg-card");
    var bg  = document.getElementById("card-bg");
    if (!svg || !bg) return;
    var fos = Array.from(svg.querySelectorAll("foreignObject[id^=\"fo-\"]"));
    var y = 0;
    fos.forEach(function (fo) {
      fo.setAttribute("y", y);
      fo.setAttribute("height", "9999");
      var div = fo.firstElementChild;
      var h = div ? Math.ceil(div.getBoundingClientRect().height) : 0;
      fo.setAttribute("height", Math.max(h, 1));
      y += h;
    });
    bg.setAttribute("height", y);
    svg.setAttribute("height", y);
    svg.setAttribute("viewBox", "0 0 800 " + y);
  }
  function initQR() {
    var qrEl = document.getElementById("qr-code");
    if (!qrEl || typeof QRCode === "undefined") return;
    var url = qrEl.getAttribute("data-url") || "https://timesinternet.com";
    new QRCode(qrEl, { text: url, width: 80, height: 80, correctLevel: QRCode.CorrectLevel.M });
  }
  if (document.fonts) { document.fonts.ready.then(layout); }
  window.addEventListener("load", function () { initQR(); setTimeout(layout, 150); });
})();
]]></script>
</svg>
