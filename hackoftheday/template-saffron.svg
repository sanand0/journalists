<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="svg-card" class="card"
     width="800" height="1800" viewBox="0 0 800 1800"
     style="display:block;overflow:visible">
<style type="text/css"><![CDATA[
  @import url("https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap");
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --title-font: 'Nunito Sans', sans-serif; --body-font: 'DM Sans', sans-serif; --saffron: #e07b00; --saffron-light: #fef3e0; --dark: #1e1200; }
  .card-header { background: var(--saffron); display: flex; align-items: stretch; }
  .badge { background: #c76b00; padding: 14px 22px 14px 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%); }
  .badge-hack { font-family: var(--title-font); font-size: 46px; font-weight: 900; color: #fff; line-height: 1; text-transform: uppercase; letter-spacing: 1px; }
  .badge-ofthe { font-family: var(--title-font); font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.85); letter-spacing: 2px; text-transform: uppercase; line-height: 1; }
  .card-title { flex: 1; display: flex; align-items: center; padding: 14px 24px; font-family: var(--title-font); font-size: 28px; font-weight: 900; color: #fff; text-transform: uppercase; line-height: 1.2; letter-spacing: 0.3px; }
  .card-body { padding: 16px 24px 0; font-family: var(--body-font); }
  .section { font-size: 19px; color: var(--dark); line-height: 1.5; margin-bottom: 11px; }
  .section-label { font-weight: 800; text-transform: uppercase; color: var(--saffron); font-size: 16px; letter-spacing: 0.5px; }
  .steps-heading { font-size: 15px; font-weight: 800; text-transform: uppercase; color: var(--saffron); letter-spacing: 1px; margin-bottom: 10px; }
  .steps-label { font-size: 14px; font-weight: 700; color: var(--saffron); text-transform: uppercase; letter-spacing: 1px; margin: 4px 0 8px; }
  .steps { counter-reset: step-counter; padding-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .step { counter-increment: step-counter; display: flex; align-items: center; background: #fff; border: 1.5px solid #f0d8a0; border-left: 4px solid var(--saffron); border-radius: 6px; padding: 14px 16px 14px 0; }
  .step::before { content: counter(step-counter); font-family: var(--title-font); font-size: 28px; font-weight: 900; color: var(--saffron); line-height: 1; min-width: 58px; text-align: center; flex-shrink: 0; }
  .step-content { font-size: 19px; color: var(--dark); line-height: 1.45; flex: 1; }
  .step-content strong { font-weight: 700; }
  .card-note { background: var(--saffron-light); margin: 0 24px 18px; border-radius: 6px; padding: 10px 14px; font-size: 17px; color: var(--dark); line-height: 1.5; border-left: 4px solid var(--saffron); font-family: var(--body-font); }
  .note-label { font-weight: 800; color: var(--saffron); text-transform: uppercase; font-size: 14px; letter-spacing: 0.5px; }
  .note-text { font-weight: 700; }
  .card-footer { display: flex; align-items: center; padding: 10px 24px 16px; gap: 16px; border-top: 2px solid #f0d8a0; }
  .disclaimer { flex: 1; font-size: 14px; color: #6b5528; line-height: 1.55; font-style: italic; font-family: var(--body-font); }
  .tip-line { display: block; margin-top: 3px; font-style: normal; }
  .tip-name { font-weight: 700; }
  .qr-block { flex-shrink: 0; text-align: center; }
  .qr-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: #6b5528; margin-bottom: 4px; line-height: 1.4; font-family: var(--body-font); }
  #qr-code canvas, #qr-code img { display: block; }
]]></style>
<rect id="card-bg" x="0" y="0" width="800" height="1800" fill="#fffcf5"/>

  <foreignObject id="fo-header" x="0" y="0" width="800" height="320" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-header">
      <div class="badge">
        <span class="badge-hack">HACK</span>
        <span class="badge-ofthe">OF THE DAY</span>
      </div>
      <h1 class="card-title">{{title}}</h1>
    </div>
  </foreignObject>

  <foreignObject id="fo-body" x="0" y="320" width="800" height="1100" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-body">
      <p class="section"><strong class="section-label">What it solves:</strong> {{what_it_solves}}</p>
      {{#what_to_do}}
      <p class="section"><strong class="section-label">What to do:</strong> {{what_to_do}}</p>
      <p class="steps-label">Steps:</p>
      {{/what_to_do}}
      {{^what_to_do}}
      <p class="steps-heading">What to do (Quick Steps):</p>
      {{/what_to_do}}
      <div class="steps">
        {{#steps}}
        <div class="step">
          <div class="step-content">{{#bold_title}}<strong>{{bold_title}}</strong> {{/bold_title}}{{{text}}}</div>
        </div>
        {{/steps}}
      </div>
    </div>
  </foreignObject>

  {{#note}}
  <foreignObject id="fo-note" x="0" y="1420" width="800" height="200" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-note">
      <span class="note-label">{{note_label}}:</span>
      <strong class="note-text"> {{note}}</strong>
    </div>
  </foreignObject>
  {{/note}}

  <foreignObject id="fo-footer" x="0" y="1620" width="800" height="155" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-footer">
      <div class="disclaimer">
        <em>Hacks are based on verified public sources. Readers are advised to follow official websites &amp; updated rules</em>
        <span class="tip-line">Tip from <strong class="tip-name">{{tip_name}}</strong>{{tip_domain}}</span>
      </div>
      <div class="qr-block">
        <div class="qr-label">Scan for<br/>more hacks</div>
        <div id="qr-code" data-url="{{qr_url}}"></div>
      </div>
    </div>
  </foreignObject>
<script type="text/javascript" href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" xlink:href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  "use strict";
  function layout() {
    var svg = document.getElementById("svg-card");
    var bg  = document.getElementById("card-bg");
    if (!svg || !bg) return;
    var fos = Array.from(svg.querySelectorAll("foreignObject[id^=\"fo-\"]"));
    var y = 0;
    fos.forEach(function (fo) {
      fo.setAttribute("y", y);
      fo.setAttribute("height", "9999");
      var div = fo.firstElementChild;
      var h = div ? Math.ceil(div.getBoundingClientRect().height) : 0;
      fo.setAttribute("height", Math.max(h, 1));
      y += h;
    });
    bg.setAttribute("height", y);
    svg.setAttribute("height", y);
    svg.setAttribute("viewBox", "0 0 800 " + y);
  }
  function initQR() {
    var qrEl = document.getElementById("qr-code");
    if (!qrEl || typeof QRCode === "undefined") return;
    var url = qrEl.getAttribute("data-url") || "https://timesinternet.com";
    new QRCode(qrEl, { text: url, width: 80, height: 80, correctLevel: QRCode.CorrectLevel.M });
  }
  if (document.fonts) { document.fonts.ready.then(layout); }
  window.addEventListener("load", function () { initQR(); setTimeout(layout, 150); });
})();
]]></script>
</svg>
