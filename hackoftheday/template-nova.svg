<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" id="svg-card" class="card"
     width="800" height="1800" viewBox="0 0 800 1800"
     style="display:block;overflow:visible">
<style type="text/css"><![CDATA[
  @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap");
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --font: 'Space Grotesk', sans-serif; --purple: #7c3aed; --purple-light: #f5f3ff; --dark: #0f172a; --gray: #64748b; --border: #e2e8f0; }
  .card-header { background: var(--purple); padding: 22px 32px 26px; }
  .badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 4px 12px 4px 9px; margin-bottom: 14px; }
  .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: #c4b5fd; flex-shrink: 0; }
  .badge-text { font-family: var(--font); font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.8); }
  .card-title { font-family: var(--font); font-size: 38px; font-weight: 800; color: #fff; line-height: 1.1; letter-spacing: -0.5px; }
  .card-body { padding: 22px 32px 0; font-family: var(--font); background: #fff; }
  .solve-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .solve-label { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--purple); margin-bottom: 6px; }
  .solve-text { font-size: 19px; color: var(--dark); line-height: 1.55; font-weight: 500; }
  .wtd-section { margin-bottom: 16px; }
  .wtd-label { font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gray); margin-bottom: 5px; }
  .wtd-text { font-size: 17px; color: var(--dark); line-height: 1.5; }
  .steps-heading, .steps-label { font-family: var(--font); font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--gray); margin-bottom: 12px; }
  .steps { counter-reset: step-counter; padding-bottom: 8px; }
  .step { counter-increment: step-counter; display: grid; grid-template-columns: 60px 1fr; align-items: flex-start; padding: 13px 0; border-bottom: 1px solid var(--border); }
  .step:first-child { border-top: 2px solid var(--purple); }
  .step::before { content: counter(step-counter, decimal-leading-zero); font-family: var(--font); font-size: 26px; font-weight: 800; color: var(--purple); line-height: 1.1; text-align: center; padding-top: 3px; }
  .step-content { font-family: var(--font); font-size: 18px; color: var(--dark); line-height: 1.5; padding: 3px 0 3px 18px; border-left: 1px solid var(--border); }
  .step-content strong { font-weight: 700; }
  .card-note { margin: 18px 32px; padding: 11px 16px; background: var(--purple-light); border-left: 3px solid var(--purple); border-radius: 0 6px 6px 0; font-family: var(--font); font-size: 16px; color: var(--dark); line-height: 1.5; }
  .note-label { font-weight: 700; color: var(--purple); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
  .note-text { font-weight: 600; }
  .card-footer { display: flex; align-items: center; padding: 12px 32px 18px; gap: 16px; border-top: 2px solid var(--dark); background: #fff; }
  .disclaimer { flex: 1; font-size: 13px; color: var(--gray); line-height: 1.55; font-style: italic; font-family: var(--font); }
  .tip-line { display: block; margin-top: 3px; font-style: normal; }
  .tip-name { font-weight: 700; color: var(--dark); }
  .qr-block { flex-shrink: 0; text-align: center; }
  .qr-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; color: var(--gray); margin-bottom: 4px; line-height: 1.4; font-family: var(--font); }
  #qr-code canvas, #qr-code img { display: block; }
]]></style>
<rect id="card-bg" x="0" y="0" width="800" height="1800" fill="#ffffff"/>

  <foreignObject id="fo-header" x="0" y="0" width="800" height="320" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-header">
      <div class="badge">
        <span class="badge-dot"></span>
        <span class="badge-text">Hack of the Day</span>
      </div>
      <h1 class="card-title">{{title}}</h1>
    </div>
  </foreignObject>

  <foreignObject id="fo-body" x="0" y="320" width="800" height="1100" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-body">
      <div class="solve-section">
        <div class="solve-label">The Problem</div>
        <div class="solve-text">{{what_it_solves}}</div>
      </div>
      {{#what_to_do}}
      <div class="wtd-section">
        <div class="wtd-label">What to do</div>
        <div class="wtd-text">{{what_to_do}}</div>
      </div>
      <p class="steps-label">Steps</p>
      {{/what_to_do}}
      {{^what_to_do}}
      <p class="steps-heading">Quick Steps</p>
      {{/what_to_do}}
      <div class="steps">
        {{#steps}}
        <div class="step">
          <div class="step-content">{{#bold_title}}<strong>{{bold_title}}</strong> {{/bold_title}}{{{text}}}</div>
        </div>
        {{/steps}}
      </div>
    </div>
  </foreignObject>

  {{#note}}
  <foreignObject id="fo-note" x="0" y="1420" width="800" height="200" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-note">
      <span class="note-label">{{note_label}}:</span>
      <strong class="note-text"> {{note}}</strong>
    </div>
  </foreignObject>
  {{/note}}

  <foreignObject id="fo-footer" x="0" y="1620" width="800" height="155" overflow="visible">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card-footer">
      <div class="disclaimer">
        <em>Hacks are based on verified public sources. Readers are advised to follow official websites &amp; updated rules</em>
        <span class="tip-line">Tip from <strong class="tip-name">{{tip_name}}</strong>{{tip_domain}}</span>
      </div>
      <div class="qr-block">
        <div class="qr-label">Scan for<br/>more hacks</div>
        <div id="qr-code" data-url="{{qr_url}}"></div>
      </div>
    </div>
  </foreignObject>
<script type="text/javascript" href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js" xlink:href="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script type="text/javascript"><![CDATA[
(function () {
  "use strict";
  function layout() {
    var svg = document.getElementById("svg-card");
    var bg  = document.getElementById("card-bg");
    if (!svg || !bg) return;
    var fos = Array.from(svg.querySelectorAll("foreignObject[id^=\"fo-\"]"));
    var y = 0;
    fos.forEach(function (fo) {
      fo.setAttribute("y", y);
      fo.setAttribute("height", "9999");
      var div = fo.firstElementChild;
      var h = div ? Math.ceil(div.getBoundingClientRect().height) : 0;
      fo.setAttribute("height", Math.max(h, 1));
      y += h;
    });
    bg.setAttribute("height", y);
    svg.setAttribute("height", y);
    svg.setAttribute("viewBox", "0 0 800 " + y);
  }
  function initQR() {
    var qrEl = document.getElementById("qr-code");
    if (!qrEl || typeof QRCode === "undefined") return;
    var url = qrEl.getAttribute("data-url") || "https://timesinternet.com";
    new QRCode(qrEl, { text: url, width: 80, height: 80, correctLevel: QRCode.CorrectLevel.M });
  }
  if (document.fonts) { document.fonts.ready.then(layout); }
  window.addEventListener("load", function () { initQR(); setTimeout(layout, 150); });
})();
]]></script>
</svg>
