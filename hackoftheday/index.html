<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hack of the Day — Gallery</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20viewBox=%220%200%2064%2064%22%3E%3Crect%20fill=%22%230e1628%22%20width=%2264%22%20height=%2264%22%20rx=%228%22/%3E%3Cpolygon%20points=%226,6%2046,6%2058,32%2046,58%206,58%22%20fill=%22%23ec1b22%22/%3E%3Ctext%20x=%2226%22%20y=%2232%22%20text-anchor=%22middle%22%20dominant-baseline=%22middle%22%20font-size=%2230%22%20font-weight=%22900%22%20fill=%22white%22%20font-family=%22Arial%20Black,sans-serif%22%3EH%3C/text%3E%3C/svg%3E"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111827;
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #e8edf5;
    }

    /* ===== PAGE HEADER ===== */
    .page-header {
      background: #0e1628;
      padding: 24px 48px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 3px solid #ec1b22;
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .page-badge {
      background: #ec1b22;
      padding: 10px 28px 10px 16px;
      clip-path: polygon(0 0, calc(100% - 18px) 0, 100% 50%, calc(100% - 18px) 100%, 0 100%);
      flex-shrink: 0;
    }
    .page-badge .b-hack {
      display: block;
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .page-badge .b-ofthe {
      display: block;
      font-size: 8px;
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .page-title h1 {
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.3px;
    }
    .page-title p {
      font-size: 13px;
      color: #5a6e96;
      margin-top: 3px;
    }

    .page-header-spacer { flex: 1; }

    .page-count {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #3a4c70;
      background: #151e33;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #1e2d4a;
    }

    /* ===== TEMPLATE PICKER ===== */
    .template-picker {
      background: #0a1020;
      border-bottom: 1px solid #1a2540;
      padding: 28px 40px 32px;
    }

    .picker-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #3a4c70;
      margin-bottom: 18px;
    }

    .picker-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: thin;
      scrollbar-color: #1e2d4a transparent;
    }

    .picker-row::-webkit-scrollbar { height: 4px; }
    .picker-row::-webkit-scrollbar-track { background: transparent; }
    .picker-row::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 2px; }

    .picker-card {
      flex-shrink: 0;
      width: 210px;
      background: #111827;
      border: 1.5px solid #1e2d4a;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
      cursor: default;
    }

    .picker-card.active {
      border-color: #ec1b22;
      box-shadow: 0 0 0 1px #ec1b22, 0 8px 32px rgba(236,27,34,0.2);
    }

    .picker-swatch {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .picker-name {
      font-size: 14px;
      font-weight: 800;
      color: #e8edf5;
      line-height: 1.2;
    }

    .picker-subtitle {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #3a4c70;
      margin-top: -4px;
    }

    .picker-desc {
      font-size: 12.5px;
      color: #5a6e96;
      line-height: 1.55;
      flex: 1;
    }

    .picker-btn {
      width: 100%;
      padding: 7px 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      border-radius: 6px;
      border: 1.5px solid #2a3d5e;
      background: transparent;
      color: #5a6e96;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .picker-btn:hover {
      background: #1a2540;
      color: #c8d8f0;
      border-color: #3a4c70;
    }

    .picker-card.active .picker-btn {
      background: #ec1b22;
      color: #fff;
      border-color: #ec1b22;
      cursor: default;
    }

    .picker-card.active .picker-btn:hover {
      background: #b8141a;
      border-color: #b8141a;
    }

    /* ===== MAIN / GALLERY ===== */
    main {
      max-width: 1320px;
      margin: 0 auto;
      padding: 52px 40px 80px;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 280px);
      gap: 28px;
      justify-content: center;
      align-items: start;
    }

    /* ===== THUMBNAIL CARD ===== */
    .thumb {
      width: 280px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      transition: transform 0.22s cubic-bezier(.22,1,.36,1), box-shadow 0.22s ease;
      background: #d2ddf2;
      position: relative;
      outline: none;
    }
    .thumb:hover, .thumb:focus-visible {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 20px 56px rgba(0,0,0,0.75), 0 0 0 2px #ec1b22;
    }

    .thumb-scaler {
      width: 280px;
      overflow: hidden;
      position: relative;
      transition: height 0.2s ease;
    }

    .thumb-iframe {
      width: 800px;
      border: none;
      transform: scale(0.35);
      transform-origin: top left;
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      pointer-events: none;
    }

    .thumb-footer {
      padding: 9px 14px;
      background: #0e1628;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid #1a2540;
    }
    .thumb-num {
      font-size: 11px;
      font-weight: 800;
      color: #ec1b22;
      letter-spacing: 1px;
    }
    .dl-btn {
      font-size: 11px;
      font-weight: 700;
      color: #5a6e96;
      background: none;
      border: 1px solid #1e2d4a;
      border-radius: 4px;
      padding: 3px 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      line-height: 1;
    }
    .dl-btn:hover {
      color: #c8d8f0;
      border-color: #3a4c70;
      background: #151e33;
    }
    .dl-btn svg {
      width: 10px;
      height: 10px;
      flex-shrink: 0;
    }

    /* ===== MODAL ===== */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .modal.hidden { display: none; }

    .modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(5, 10, 22, 0.9);
      backdrop-filter: blur(8px);
    }

    .modal-container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .modal-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-counter {
      font-size: 13px;
      font-weight: 700;
      color: #5a6e96;
      letter-spacing: 1.5px;
    }

    .modal-close {
      background: #ec1b22;
      border: none;
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      transition: background 0.15s, transform 0.15s;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .modal-close:hover { background: #b8141a; transform: scale(1.1); }

    .modal-body {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .nav-btn {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.15s, opacity 0.15s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.16);
      transform: scale(1.08);
    }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; pointer-events: none; }

    .modal-iframe {
      width: 800px;
      height: min(88vh, 900px);
      border: none;
      border-radius: 4px;
      box-shadow: 0 28px 90px rgba(0,0,0,0.8);
      display: block;
    }

    /* ===== LOADING / ERROR ===== */
    .status {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      color: #3a4c70;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #1a2540;
      border-top-color: #ec1b22;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    .status p { font-size: 15px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== DOWNLOAD ALL ===== */
    .dl-all-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1a2540;
      border: 1px solid #2a3d5e;
      color: #7a8faf;
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .dl-all-btn:hover:not(:disabled) {
      background: #243050;
      color: #c8d8f0;
      border-color: #3a4c70;
    }
    .dl-all-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .dl-all-btn svg { width: 12px; height: 12px; flex-shrink: 0; }
  </style>
</head>
<body>

<header class="page-header">
  <div class="page-badge">
    <span class="b-hack">HACK</span>
    <span class="b-ofthe">OF THE DAY</span>
  </div>
  <div class="page-title">
    <h1>Gallery</h1>
    <p>Click any card to view it in full</p>
  </div>
  <div class="page-header-spacer"></div>
  <div class="page-count" id="count"></div>
  <button class="dl-all-btn" id="dl-all" disabled title="Download all cards as a ZIP">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Download All
  </button>
</header>

<!-- Template picker -->
<section class="template-picker">
  <p class="picker-label">Choose a card style</p>
  <div class="picker-row" id="picker-row"></div>
</section>

<main>
  <div class="gallery-grid" id="gallery">
    <div class="status">
      <div class="spinner"></div>
      <p>Loading cards…</p>
    </div>
  </div>
</main>

<!-- Modal -->
<div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Card detail">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-container">
    <div class="modal-topbar">
      <span class="modal-counter" id="modal-counter"></span>
      <button class="modal-close" id="modal-close" title="Close (Esc)" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <button class="nav-btn" id="modal-prev" title="Previous (←)" aria-label="Previous card">&#8249;</button>
      <iframe id="modal-iframe" class="modal-iframe" title="Full card"></iframe>
      <button class="nav-btn" id="modal-next" title="Next (→)" aria-label="Next card">&#8250;</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/mustache@4.2.0/mustache.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script>
/* ============================================================
   TEMPLATE CATALOGUE
   Each entry describes one card style.
   'id'    – used as the ?template= URL parameter value
   'file'  – the Mustache template file to load
   'bg'    – card background colour (for .thumb background)
   ============================================================ */
const TEMPLATES = [
  {
    id: 'original',
    file: 'template.html',
    name: 'Classic Blue',
    subtitle: 'The original',
    desc: 'Crisp steel-blue card, bold red pentagon badge, and stacked folder-style steps. The benchmark every other variant is measured against.',
    swatchFrom: '#d2ddf2',
    swatchTo:   '#396ce1',
    bg: '#d2ddf2',
  },
  {
    id: 'broadsheet',
    file: 'template-broadsheet.html',
    name: 'Broadsheet Heritage',
    subtitle: 'Time-tested authority',
    desc: 'Cream paper, serif type, double-rule borders. The unmistakable voice of a newspaper that has printed the news for generations.',
    swatchFrom: '#f5f0e6',
    swatchTo:   '#8b0000',
    bg: '#f5f0e6',
  },
  {
    id: 'saffron',
    file: 'template-saffron.html',
    name: 'Saffron Signal',
    subtitle: 'Warmth and confidence',
    desc: "India's amber-gold anchors a bold header. Clean, distinct steps without stacking — modern enough to feel fresh, warm enough to feel home.",
    swatchFrom: '#fffcf5',
    swatchTo:   '#e07b00',
    bg: '#fffcf5',
  },
  {
    id: 'noir',
    file: 'template-noir.html',
    name: 'Night Ink',
    subtitle: 'Premium drama',
    desc: 'Deep-navy field, luminous white step panels, gold numerals. Reserved for the story that demands to be noticed across the page.',
    swatchFrom: '#131824',
    swatchTo:   '#f0c040',
    bg: '#131824',
  },
  {
    id: 'magazine',
    file: 'template-magazine.html',
    name: 'Bold Folio',
    subtitle: 'Editorial power',
    desc: 'Ghost numerals tower behind each step like silent headlines. White space breathes; the red masthead commands. Magazine energy in a newspaper format.',
    swatchFrom: '#ffffff',
    swatchTo:   '#ec1b22',
    bg: '#ffffff',
  },
  {
    id: 'minimal',
    file: 'template-minimal.html',
    name: 'Signal Strip',
    subtitle: 'Clarity above all',
    desc: 'A single red rule runs the left edge of every step — no boxes, no shadows, nothing in the way of the words. Serene, purposeful, uncompromising.',
    swatchFrom: '#ffffff',
    swatchTo:   '#ec1b22',
    bg: '#ffffff',
  },
];

/* ============================================================
   URL PARAMETER HELPERS
   ============================================================ */
function getTemplateId() {
  const p = new URLSearchParams(window.location.search).get('template');
  return TEMPLATES.find(t => t.id === p) ? p : 'original';
}

function setTemplateId(id) {
  const url = new URL(window.location.href);
  url.searchParams.set('template', id);
  window.location.href = url.toString();
}

/* ============================================================
   BUILD TEMPLATE PICKER
   ============================================================ */
const activeId = getTemplateId();
const activeTpl = TEMPLATES.find(t => t.id === activeId);

const pickerRow = document.getElementById('picker-row');

TEMPLATES.forEach(tpl => {
  const isActive = tpl.id === activeId;

  const card = document.createElement('div');
  card.className = 'picker-card' + (isActive ? ' active' : '');

  const swatch = document.createElement('div');
  swatch.className = 'picker-swatch';
  swatch.style.background = `linear-gradient(90deg, ${tpl.swatchFrom} 0%, ${tpl.swatchTo} 100%)`;

  const name = document.createElement('div');
  name.className = 'picker-name';
  name.textContent = tpl.name;

  const sub = document.createElement('div');
  sub.className = 'picker-subtitle';
  sub.textContent = tpl.subtitle;

  const desc = document.createElement('p');
  desc.className = 'picker-desc';
  desc.textContent = tpl.desc;

  const btn = document.createElement('button');
  btn.className = 'picker-btn';
  btn.textContent = isActive ? 'Active' : 'Apply';
  btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
  if (!isActive) {
    btn.addEventListener('click', () => setTemplateId(tpl.id));
  }

  card.appendChild(swatch);
  card.appendChild(name);
  card.appendChild(sub);
  card.appendChild(desc);
  card.appendChild(btn);
  pickerRow.appendChild(card);
});

/* ============================================================
   GALLERY
   ============================================================ */
(async () => {
  const CARD_WIDTH  = 800;
  const CARD_H_INIT = 1000;
  const SCALE       = 0.35;
  const THUMB_W     = Math.round(CARD_WIDTH * SCALE); // 280

  const gallery       = document.getElementById('gallery');
  const countEl       = document.getElementById('count');
  const dlAllBtn      = document.getElementById('dl-all');
  const modal         = document.getElementById('modal');
  const modalIframe   = document.getElementById('modal-iframe');
  const modalClose    = document.getElementById('modal-close');
  const modalBackdrop = document.getElementById('modal-backdrop');
  const modalCounter  = document.getElementById('modal-counter');
  const modalPrev     = document.getElementById('modal-prev');
  const modalNext     = document.getElementById('modal-next');

  let currentIndex = -1;
  let renderedFull = [];

  /* ---- Modal helpers ---- */
  function openModal(index) {
    currentIndex = index;
    modalIframe.srcdoc = renderedFull[index];
    modalCounter.textContent = `${index + 1} / ${renderedFull.length}`;
    modalPrev.disabled = index === 0;
    modalNext.disabled = index === renderedFull.length - 1;
    modal.classList.remove('hidden');
    modalClose.focus();
  }

  function closeModal() {
    modal.classList.add('hidden');
    modalIframe.srcdoc = '';
    currentIndex = -1;
  }

  modalClose.addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', closeModal);
  modalPrev.addEventListener('click', () => openModal(currentIndex - 1));
  modalNext.addEventListener('click', () => openModal(currentIndex + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); return; }
    if (modal.classList.contains('hidden')) return;
    if (e.key === 'ArrowLeft' && currentIndex > 0) {
      e.preventDefault();
      openModal(currentIndex - 1);
    } else if (e.key === 'ArrowRight' && currentIndex < renderedFull.length - 1) {
      e.preventDefault();
      openModal(currentIndex + 1);
    }
  });

  /* ---- Load data + selected template ---- */
  let cards, template;
  try {
    [cards, template] = await Promise.all([
      fetch('cards.json').then(r => r.json()),
      fetch(activeTpl.file).then(r => r.text()),
    ]);
  } catch (err) {
    gallery.innerHTML = `<div class="status"><p style="color:#ef4444">Failed to load: ${err.message}</p></div>`;
    return;
  }

  /* Thumbnail variant: remove body padding/centering */
  const thumbTpl = template.replace(
    '</head>',
    `<style>body{padding:0!important;display:block!important;background:${activeTpl.bg}!important}</style></head>`
  );

  countEl.textContent = `${cards.length} cards`;
  gallery.innerHTML = '';

  dlAllBtn.disabled = false;
  dlAllBtn.addEventListener('click', async () => {
    const label = dlAllBtn.innerHTML;
    dlAllBtn.disabled = true;
    dlAllBtn.textContent = 'Zipping…';
    try {
      const zip = new JSZip();
      renderedFull.forEach((html, i) => {
        zip.file(`hack-of-the-day-${String(i + 1).padStart(3, '0')}.html`, html);
      });
      const blob = await zip.generateAsync({ type: 'blob' });
      const url  = URL.createObjectURL(blob);
      Object.assign(document.createElement('a'), {
        href: url, download: 'hack-of-the-day.zip',
      }).click();
      URL.revokeObjectURL(url);
    } finally {
      dlAllBtn.disabled = false;
      dlAllBtn.innerHTML = label;
    }
  });

  cards.forEach((card, i) => {
    const thumbHtml = Mustache.render(thumbTpl, card);
    const fullHtml  = Mustache.render(template,  card);
    renderedFull.push(fullHtml);

    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    thumb.style.background = activeTpl.bg;
    thumb.setAttribute('role', 'button');
    thumb.setAttribute('tabindex', '0');
    thumb.setAttribute('aria-label', `Card ${i + 1}: ${card.title}`);

    const scaler = document.createElement('div');
    scaler.className = 'thumb-scaler';
    scaler.style.cssText = `width:${THUMB_W}px;height:${Math.round(CARD_H_INIT * SCALE)}px`;

    const iframe = document.createElement('iframe');
    iframe.className = 'thumb-iframe';
    iframe.style.cssText = `width:${CARD_WIDTH}px;height:${CARD_H_INIT}px;transform:scale(${SCALE})`;
    iframe.srcdoc = thumbHtml;
    iframe.title  = card.title;

    iframe.addEventListener('load', () => {
      setTimeout(() => {
        try {
          const cardEl = iframe.contentDocument?.querySelector('.card');
          if (!cardEl) return;
          const h = Math.ceil(cardEl.getBoundingClientRect().height);
          iframe.style.height = h + 'px';
          scaler.style.height = Math.ceil(h * SCALE) + 'px';
        } catch (_) {}
      }, 400);
    });

    scaler.appendChild(iframe);
    thumb.appendChild(scaler);

    const footer = document.createElement('div');
    footer.className = 'thumb-footer';

    const numSpan = document.createElement('span');
    numSpan.className = 'thumb-num';
    numSpan.textContent = `#${String(i + 1).padStart(2, '0')}`;

    const dlBtn = document.createElement('button');
    dlBtn.className = 'dl-btn';
    dlBtn.title = `Download hack-of-the-day-${String(i + 1).padStart(3, '0')}.html`;
    dlBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
       <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
       <polyline points="7 10 12 15 17 10"/>
       <line x1="12" y1="15" x2="12" y2="3"/>
     </svg> Download`;
    dlBtn.addEventListener('click', e => {
      e.stopPropagation();
      const blob = new Blob([fullHtml], { type: 'text/html' });
      const url  = URL.createObjectURL(blob);
      const a    = Object.assign(document.createElement('a'), {
        href: url,
        download: `hack-of-the-day-${String(i + 1).padStart(3, '0')}.html`,
      });
      a.click();
      URL.revokeObjectURL(url);
    });

    footer.appendChild(numSpan);
    footer.appendChild(dlBtn);
    footer.addEventListener('click', e => e.stopPropagation());
    thumb.appendChild(footer);

    thumb.addEventListener('click', () => openModal(i));
    thumb.addEventListener('keydown', e => (e.key === 'Enter' || e.key === ' ') && openModal(i));

    gallery.appendChild(thumb);
  });
})();
</script>
</body>
</html>
